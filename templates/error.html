<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} - {{ title }} | Happy Children</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/error.css') }}">
</head>
<body>
    <!-- Background Elements -->
    <div class="decoration dec1"></div>
    <div class="decoration dec2"></div>
    <div class="decoration dec3"></div>
    <div class="festive-element f1"><i class="fas fa-candy-cane"></i></div>
    <div class="festive-element f2"><i class="fas fa-umbrella-beach"></i></div>
    <div class="festive-element f3"><i class="fas fa-gift"></i></div>
    <div class="festive-element f4"><i class="fas fa-cookie-bite"></i></div>
    
    <div class="error-container">
        <!-- Hero Illustration -->
        <div class="illustration-wrapper">
            <img src="{{ url_for('static', filename='images/error_illustration.png') }}" alt="Piñata Rota" class="error-img">
        </div>
        
        <div class="error-content">
            <div class="error-code">{{ code }}</div>
            <h1>{{ title }}</h1>
            <p>{{ message }}</p>
            
            <a href="/" class="btn-home">
                <i class="fas fa-rocket me-2"></i> Volver a la Diversión
            </a>
            
            <div class="footer-text">
                Piñatería Happy Children — ¡Tu fiesta volverá pronto!
            </div>
        </div>
    </div>
</body>
</html>
