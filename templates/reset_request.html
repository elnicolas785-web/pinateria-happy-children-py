<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Recuperar Contraseña - Happy Children</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1565C0; border: none; border-radius: 25px; }
        .happy { color: #1565C0; font-weight: bold; }
        .children { color: #FF4081; font-weight: bold; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h3><span class="happy">Happy</span><span class="children">Children</span></h3>
                </div>
                <div class="card p-4">
                    <div class="card-body">
                        <h4 class="text-center mb-4">Recuperar Contraseña</h4>
                        <p class="text-muted text-center small">Introduce tu correo y te enviaremos un enlace para restablecer tu clave.</p>
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Enviar enlace</button>
                                <a href="{{ url_for('auth.login') }}" class="btn btn-link text-decoration-none">Volver al inicio</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
